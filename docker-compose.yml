services:
  postgres:
    image: postgres:16-alpine
    container_name: lfiathan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lfiathan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lfiathan_secret}
      POSTGRES_DB: ${DB_NAME:-agent_lfiathan}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lfiathan} -d ${DB_NAME:-agent_lfiathan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lfiathan-net

  redis:
    image: redis:7-alpine
    container_name: lfiathan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lfiathan-net

  app:
    build: .
    container_name: lfiathan-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lfiathan}
      DB_PASSWORD: ${DB_PASSWORD:-lfiathan_secret}
      DB_NAME: ${DB_NAME:-agent_lfiathan}
      REDIS_URL: redis://redis:6379
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./database:/app/database:ro
    networks:
      - lfiathan-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  pgdata:
  redisdata:

networks:
  lfiathan-net:
    driver: bridge